<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlannerTime Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    /* ===== VARIABLES ===== */
    :root {
      --color-primary: #137fec;
      --color-primary-hover: #0d6ebd;
      --color-primary-light: rgba(19,127,236,0.1);
      --color-primary-20: rgba(19,127,236,0.2);
      --color-success: #22c55e;
      --color-success-light: rgba(34,197,94,0.1);
      --color-warning: #f59e0b;
      --color-warning-light: rgba(245,158,11,0.1);
      --color-danger: #ef4444;
      --color-danger-light: rgba(239,68,68,0.1);
      --color-info: #3b82f6;
      --color-info-light: rgba(59,130,246,0.1);
      --bg-primary: #f6f7f8;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --bg-hover: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-tertiary: #94a3b8;
      --text-inverse: #ffffff;
      --border-primary: #e2e8f0;
      --border-secondary: #cbd5e1;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08),0 4px 6px -4px rgba(0,0,0,0.05);
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius-sm: 0.25rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --transition-fast: 150ms ease;
      --transition-base: 200ms ease;
      --transition-slow: 300ms ease;
      --sidebar-w: 256px;
      --header-h: 64px;
    }
    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-hover: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --border-primary: #334155;
      --border-secondary: #475569;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
    }

    /* ===== RESET ===== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{font-family:var(--font-family);font-size:1rem;line-height:1.5;color:var(--text-primary);background:var(--bg-primary);transition:background var(--transition-base),color var(--transition-base);overflow:hidden;height:100vh}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    input{font-family:inherit;font-size:inherit}
    img{max-width:100%;display:block}
    ul,ol{list-style:none}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-secondary);border-radius:var(--radius-full)}
    ::selection{background:var(--color-primary-20);color:var(--color-primary)}
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
    .material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

    /* ===== LAYOUT ===== */
    .dash-layout{display:flex;height:100vh;overflow:hidden}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;opacity:0;transition:opacity var(--transition-slow)}
    .sidebar-overlay.active{opacity:1;display:block}

    /* ===== SIDEBAR ===== */
    .sidebar{display:none;width:var(--sidebar-w);height:100%;background:var(--bg-secondary);border-right:1px solid var(--border-primary);flex-direction:column;transition:transform var(--transition-slow);z-index:40}
    @media(min-width:768px){.sidebar{display:flex}}
    .sidebar-head{padding:1.5rem;border-bottom:1px solid var(--border-primary)}
    .sidebar-nav{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.25rem}
    .sidebar-foot{padding:1rem;border-top:1px solid var(--border-primary)}
    .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem;border-radius:var(--radius-md);color:var(--text-secondary);font-size:0.875rem;font-weight:500;transition:all var(--transition-fast);cursor:pointer}
    .nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary)}
    .nav-item.active{background:var(--color-primary-light);color:var(--color-primary);font-weight:600}
    .nav-item .material-symbols-outlined{font-size:22px}
    .nav-badge{margin-left:auto;background:var(--color-danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:var(--radius-full);line-height:1.2}
    .nav-divider{height:1px;background:var(--border-primary);margin:0.5rem 0}
    .nav-logout{display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0.75rem;width:100%;border-radius:var(--radius-md);color:var(--text-secondary);font-size:0.875rem;font-weight:500;transition:all var(--transition-fast)}
    .nav-logout:hover{background:var(--color-danger-light);color:var(--color-danger)}
    @media(max-width:767px){
      .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
    }

    /* ===== MAIN ===== */
    .main-wrap{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden}

    /* ===== HEADER ===== */
    .top-header{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:var(--bg-secondary);border-bottom:1px solid var(--border-primary);flex-shrink:0;z-index:10}
    .header-left,.header-right{display:flex;align-items:center;gap:1rem}
    .mobile-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:var(--radius-md);color:var(--text-secondary);transition:all var(--transition-fast)}
    .mobile-btn:hover{background:var(--bg-tertiary);color:var(--text-primary)}
    @media(min-width:768px){.mobile-btn{display:none}}
    .search-bar{position:relative;width:100%;max-width:400px}
    .search-bar input{width:100%;height:40px;padding:0 1rem 0 2.5rem;background:var(--bg-tertiary);border:none;border-radius:var(--radius-md);color:var(--text-primary);font-size:0.875rem;transition:all var(--transition-fast)}
    .search-bar input::placeholder{color:var(--text-tertiary)}
    .search-bar input:focus{outline:none;background:var(--bg-hover);box-shadow:0 0 0 2px var(--color-primary-light)}
    .search-bar .s-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--text-tertiary);pointer-events:none}
    .hdr-action{position:relative;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:var(--radius-md);color:var(--text-secondary);transition:all var(--transition-fast)}
    .hdr-action:hover{background:var(--bg-tertiary);color:var(--text-primary)}
    .notif-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--color-danger);border-radius:var(--radius-full);border:2px solid var(--bg-secondary)}
    .hdr-div{width:1px;height:32px;background:var(--border-primary)}
    .user-menu{display:flex;align-items:center;gap:0.75rem;padding:0.25rem 0.75rem 0.25rem 0.25rem;border-radius:var(--radius-full);border:1px solid transparent;transition:all var(--transition-fast);cursor:pointer}
    .user-menu:hover{background:var(--bg-hover);border-color:var(--border-primary)}
    .user-info{display:none}
    @media(min-width:640px){.user-info{display:flex;flex-direction:column}}
    .user-name{font-size:0.875rem;font-weight:500;color:var(--text-primary);line-height:1.2}
    .user-role{font-size:0.75rem;color:var(--text-tertiary)}

    /* ===== CONTENT ===== */
    .content-area{flex:1;overflow-y:auto;padding:1rem 1.5rem}
    @media(min-width:768px){.content-area{padding:2rem}}
    .content-box{max-width:1200px;margin:0 auto}
    .view-container{animation:fadeIn 0.2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* ===== COMPONENTS ===== */
    .logo{display:flex;align-items:center;gap:0.75rem}
    .logo-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);background:var(--color-primary-light);color:var(--color-primary)}
    .logo-icon .material-symbols-outlined{font-size:20px}
    .logo-text{font-size:1.125rem;font-weight:700;color:var(--text-primary)}
    .logo-sub{font-size:0.75rem;color:var(--text-tertiary);font-weight:400}
    .avatar{width:40px;height:40px;border-radius:var(--radius-full);background-size:cover;background-position:center;background-color:var(--bg-tertiary);flex-shrink:0}
    .avatar-xl{width:80px;height:80px;border-radius:var(--radius-lg)}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;padding:0.75rem 1.25rem;font-size:0.875rem;font-weight:600;border-radius:var(--radius-md);transition:all var(--transition-fast);white-space:nowrap;line-height:1;height:44px}
    .btn:active{transform:scale(0.98)}
    .btn-primary{background:var(--color-primary);color:var(--text-inverse);box-shadow:0 1px 3px rgba(19,127,236,0.3)}
    .btn-primary:hover{background:var(--color-primary-hover);box-shadow:0 4px 12px rgba(19,127,236,0.4)}
    .btn-secondary{background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-primary)}
    .btn-secondary:hover{background:var(--bg-hover);border-color:var(--border-secondary)}
    .btn-ghost{background:transparent;color:var(--text-secondary)}
    .btn-ghost:hover{background:var(--bg-tertiary);color:var(--text-primary)}
    .btn-danger{background:var(--color-danger-light);color:var(--color-danger)}
    .btn-danger:hover{background:var(--color-danger);color:var(--text-inverse)}
    .btn-full{width:100%}
    .btn-sm{height:36px;padding:0.5rem 0.75rem;font-size:0.75rem}

    .card{background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden}
    .card-body{padding:1.5rem}
    .card-hover:hover{box-shadow:var(--shadow-md);border-color:var(--border-secondary)}

    .badge{display:inline-flex;align-items:center;gap:0.25rem;padding:0.25rem 0.75rem;font-size:0.75rem;font-weight:600;border-radius:var(--radius-full);line-height:1.4}
    .badge-primary{background:var(--color-primary-light);color:var(--color-primary);border:1px solid var(--color-primary-20)}
    .badge-warning{background:var(--color-warning-light);color:var(--color-warning);border:1px solid rgba(245,158,11,0.2)}

    .form-group{display:flex;flex-direction:column;gap:0.5rem}
    .form-label{font-size:0.875rem;font-weight:500;color:var(--text-primary)}
    .form-input{width:100%;height:48px;padding:0 1rem;background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:var(--radius-md);color:var(--text-primary);transition:all var(--transition-fast)}
    .form-input::placeholder{color:var(--text-tertiary)}
    .form-input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-light)}

    .checkbox-wrapper{display:flex;align-items:flex-start;gap:0.75rem;cursor:pointer}
    .checkbox-input{width:20px;height:20px;border:2px solid var(--border-secondary);border-radius:var(--radius-sm);appearance:none;cursor:pointer;transition:all var(--transition-fast);flex-shrink:0;position:relative}
    .checkbox-input:checked{background:var(--color-primary);border-color:var(--color-primary)}
    .checkbox-input:checked::after{content:'';position:absolute;left:5px;top:1px;width:6px;height:11px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}

    .flex-center{display:flex;align-items:center;justify-content:center}

    /* ===== PAGE HEADER ===== */
    .page-header{display:flex;flex-direction:column;gap:1rem;margin-bottom:2rem}
    @media(min-width:768px){.page-header{flex-direction:row;align-items:flex-end;justify-content:space-between}}
    .page-title{font-size:1.5rem;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em}
    @media(min-width:768px){.page-title{font-size:1.875rem}}
    .page-sub{font-size:0.875rem;color:var(--text-secondary);margin-top:0.25rem;display:flex;align-items:center;gap:0.5rem}

    /* ===== DASHBOARD GRID ===== */
    .dash-grid{display:grid;grid-template-columns:1fr;gap:1.5rem}
    @media(min-width:1024px){.dash-grid{grid-template-columns:2fr 1fr}}
    .dash-main,.dash-side{display:flex;flex-direction:column;gap:1.5rem}

    /* ===== SECTION ===== */
    .sec-title{font-size:1.125rem;font-weight:700;color:var(--text-primary);margin-bottom:0.75rem}
    .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
    .sec-link{font-size:0.875rem;font-weight:500;color:var(--color-primary)}
    .sec-link:hover{text-decoration:underline}

    /* ===== APPOINTMENT CARD ===== */
    .appt-card{display:flex;flex-direction:column;gap:1.25rem;padding:1.25rem}
    @media(min-width:640px){.appt-card{flex-direction:row;align-items:center}}
    .appt-doc{position:relative;flex-shrink:0}
    .appt-vid{position:absolute;bottom:-6px;right:-6px;width:28px;height:28px;background:var(--color-success);border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;border:2px solid var(--bg-secondary)}
    .appt-vid .material-symbols-outlined{font-size:14px;color:#fff}
    .appt-info{flex:1;min-width:0}
    .appt-name{font-size:1.25rem;font-weight:700;color:var(--text-primary)}
    .appt-spec{font-size:0.875rem;color:var(--text-secondary);font-weight:500}
    .appt-meta{display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:0.5rem}
    .appt-meta-item{display:flex;align-items:center;gap:0.375rem;padding:0.25rem 0.625rem;background:var(--bg-tertiary);border-radius:var(--radius-sm);font-size:0.75rem;font-weight:500;color:var(--text-secondary)}
    .appt-meta-item .material-symbols-outlined{font-size:14px}

    /* ===== ACTIVITY ===== */
    .act-list{display:flex;flex-direction:column}
    .act-item{display:flex;align-items:flex-start;gap:1rem;padding:1rem;cursor:pointer;transition:background var(--transition-fast)}
    .act-item:hover{background:var(--bg-hover)}
    .act-icon{width:40px;height:40px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .act-icon-blue{background:var(--color-info-light);color:var(--color-info)}
    .act-icon-green{background:var(--color-success-light);color:var(--color-success)}
    .act-icon-orange{background:var(--color-warning-light);color:var(--color-warning)}
    .act-content{flex:1;min-width:0}
    .act-header{display:flex;justify-content:space-between;align-items:flex-start}
    .act-title{font-size:0.875rem;font-weight:500;color:var(--text-primary)}
    .act-time{font-size:0.75rem;color:var(--text-tertiary);white-space:nowrap}
    .act-desc{font-size:0.875rem;color:var(--text-secondary);margin-top:2px}
    .act-footer{padding:0.75rem;background:var(--bg-tertiary);border-top:1px solid var(--border-primary);text-align:center}
    .act-footer button{font-size:0.875rem;font-weight:500;color:var(--text-secondary);transition:color var(--transition-fast)}
    .act-footer button:hover{color:var(--text-primary)}

    /* ===== VITALS ===== */
    .vital-card{padding:1rem;position:relative;overflow:hidden}
    .vital-bg{position:absolute;top:0;right:0;padding:1rem;opacity:0.1;transition:opacity var(--transition-fast)}
    .vital-card:hover .vital-bg{opacity:0.2}
    .vital-bg .material-symbols-outlined{font-size:56px}
    .vital-head{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem}
    .vital-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center}
    .vital-icon .material-symbols-outlined{font-size:20px}
    .vital-label{font-size:0.875rem;font-weight:600;color:var(--text-secondary)}
    .vital-val{font-size:1.5rem;font-weight:700;color:var(--text-primary);display:flex;align-items:baseline;gap:0.5rem}
    .vital-unit{font-size:0.875rem;font-weight:400;color:var(--text-tertiary)}
    .vital-change{font-size:0.75rem;font-weight:500;display:flex;align-items:center;gap:2px}
    .vital-down{color:var(--color-success)}
    .vital-bar{height:4px;background:var(--bg-tertiary);border-radius:var(--radius-full);margin-top:0.75rem;overflow:hidden}
    .vital-bar-fill{height:100%;border-radius:var(--radius-full)}
    .vital-status{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem}
    .vital-dot{width:8px;height:8px;border-radius:var(--radius-full);background:var(--color-success)}
    .vital-status-txt{font-size:0.75rem;color:var(--text-tertiary)}

    /* ===== QUICK ACTIONS ===== */
    .qa{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0.75rem;background:var(--bg-tertiary);border-radius:var(--radius-md);transition:all var(--transition-fast);text-align:left}
    .qa:hover{background:var(--bg-hover)}
    .qa-left{display:flex;align-items:center;gap:0.75rem}
    .qa-left .material-symbols-outlined{color:var(--text-tertiary);transition:color var(--transition-fast)}
    .qa:hover .qa-left .material-symbols-outlined{color:var(--color-primary)}
    .qa-text{font-size:0.875rem;font-weight:500;color:var(--text-primary)}
    .qa .chevron{font-size:18px;color:var(--text-tertiary)}

    /* ===== TABLE ===== */
    .table-wrap{overflow-x:auto}
    .dtable{width:100%;min-width:700px;border-collapse:collapse;text-align:left}
    .dtable th{padding:1rem 1.5rem;font-size:0.75rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;background:var(--bg-tertiary);border-bottom:1px solid var(--border-primary)}
    .dtable td{padding:1rem 1.5rem;font-size:0.875rem;border-bottom:1px solid var(--border-primary)}
    .dtable tr:last-child td{border-bottom:none}
    .dtable tbody tr{transition:background var(--transition-fast)}
    .dtable tbody tr:hover{background:var(--bg-hover)}
    .tbl-doc{display:flex;align-items:center;gap:0.75rem}
    .tbl-doc-name{font-weight:600;color:var(--text-primary)}
    .tbl-doc-spec-m{display:block;font-size:0.75rem;color:var(--text-tertiary)}
    @media(min-width:768px){.tbl-doc-spec-m{display:none}}
    .tbl-date{display:flex;flex-direction:column}
    .tbl-date-time{font-weight:500;color:var(--text-primary)}
    .tbl-date-date{font-size:0.75rem;color:var(--text-tertiary)}
    .tbl-actions{text-align:right}
    .tbl-act-btn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--text-tertiary);transition:all var(--transition-fast)}
    .tbl-act-btn:hover{background:var(--bg-tertiary);color:var(--text-primary)}
    .tbl-pag{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-top:1px solid var(--border-primary)}
    .tbl-pag-info{font-size:0.875rem;color:var(--text-tertiary)}
    .tbl-pag-info strong{color:var(--text-primary);font-weight:500}
    .tbl-pag-btns{display:flex;gap:0.5rem}

    /* ===== TABS ===== */
    .tabs{display:flex;gap:2rem;border-bottom:1px solid var(--border-primary)}
    .tab{position:relative;padding:0.75rem 0;font-size:0.875rem;font-weight:500;color:var(--text-tertiary);cursor:pointer;transition:color var(--transition-fast)}
    .tab:hover{color:var(--text-primary)}
    .tab.active{color:var(--color-primary);font-weight:600}
    .tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--color-primary);border-radius:var(--radius-full) var(--radius-full) 0 0}

    /* ===== FILTER ===== */
    .filter-bar{display:flex;flex-direction:column;gap:0.75rem}
    @media(min-width:1024px){.filter-bar{flex-direction:row;align-items:flex-end}}
    .filter-input{position:relative}
    .filter-input input{height:40px;width:100%;padding:0 1rem 0 2.5rem;background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:var(--radius-md);color:var(--text-primary);font-size:0.875rem;transition:all var(--transition-fast);box-shadow:var(--shadow-sm)}
    .filter-input input::placeholder{color:var(--text-tertiary)}
    .filter-input input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-light)}
    .filter-input .material-symbols-outlined{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:20px;pointer-events:none}

    /* ===== TOAST ===== */
    .toast{position:fixed;bottom:1.5rem;right:1.5rem;display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);font-size:0.875rem;color:var(--text-primary);transform:translateY(100%);opacity:0;transition:all var(--transition-slow);z-index:100}

    const Theme = {
      KEY: 'pt-theme',
      init() {
        const s = localStorage.getItem(this.KEY);
        const d = window.matchMedia('(prefers-color-scheme:dark)').matches;
        this.set(s || (d ? 'dark' : 'light'));
      },
      set(t) {
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem(this.KEY, t);
        const i = document.querySelector('#themeBtn .material-symbols-outlined');
        if (i) i.textContent = t === 'dark' ? 'light_mode' : 'dark_mode';
      },
      toggle() { this.set(this.current === 'dark' ? 'light' : 'dark'); },
      get current() { return document.documentElement.getAttribute('data-theme') || 'light'; }
    };

    /* ===== TOAST ===== */
    function toast(msg, type = 'info', dur = 3000) {
      const icons = { success: 'check_circle', error: 'error', warning: 'warning', info: 'info' };
      const t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.innerHTML = '<span class="material-symbols-outlined">' + (icons[type] || 'info') + '</span><span>' + msg + '</span>';
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add('toast-visible'));
      setTimeout(() => { t.classList.remove('toast-visible'); setTimeout(() => t.remove(), 300); }, dur);
    }

    /* ===== DEBOUNCE ===== */
    function debounce(fn, d = 300) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), d); }; }

    /* ===== ROUTER ===== */
    let curRoute = null;
    const app = document.getElementById('app');

    function go(path) { window.location.hash = path; }

    function render() {
      const hash = window.location.hash.slice(1) || '/';
      if (!V[hash]) { go('/'); return; }
      if (curRoute === hash) return;
      curRoute = hash;
      document.title = ({'/':'Dashboard','/appointments':'Appointments','/records':'Records','/messages':'Messages','/settings':'Settings'})[hash] + ' - PlannerTime';
      document.querySelectorAll('.nav-item[data-route]').forEach(n => n.classList.toggle('active', n.dataset.route === hash));
      app.innerHTML = '<div class="view-container">' + V[hash] + '</div>';
      initView(hash);
    }

    function initView(h) {
      if (h === '/') {
        const d = document.getElementById('curDate');
        if (d) d.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
      }
      if (h === '/appointments') {
        document.querySelectorAll('#apptTabs .tab').forEach(t => t.addEventListener('click', e => { e.preventDefault(); document.querySelectorAll('#apptTabs .tab').forEach(x => x.classList.remove('active')); t.classList.add('active'); }));
        const s = document.getElementById('apptSearch');
        if (s) s.addEventListener('input', debounce(e => { const q = e.target.value.toLowerCase(); document.querySelectorAll('#apptTable tbody tr').forEach(r => { r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; }); }));
      }
      if (h === '/records') {
        const s = document.getElementById('recSearch');
        if (s) s.addEventListener('input', debounce(e => { const q = e.target.value.toLowerCase(); document.querySelectorAll('#recList .act-item').forEach(r => { r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; }); }));
      }
      if (h === '/settings') {
        const tb = document.getElementById('setThemeBtn');
        if (tb) {
          function upd() { const dk = Theme.current === 'dark'; const l = tb.querySelector('.theme-lbl'); const i = tb.querySelector('.material-symbols-outlined'); if (l) l.textContent = dk ? 'Disable Dark Mode' : 'Enable Dark Mode'; if (i) i.textContent = dk ? 'light_mode' : 'dark_mode'; }
          upd();
          tb.onclick = () => { Theme.toggle(); upd(); };
        }
        const pf = document.getElementById('profForm');
        if (pf) pf.onsubmit = e => { e.preventDefault(); toast('Profile updated successfully', 'success'); };
        const sb = document.getElementById('setSaveBtn');
        if (sb) sb.onclick = () => { sb.disabled = true; sb.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px;animation:spin 1s linear infinite">progress_activity</span> Saving...'; setTimeout(() => { sb.disabled = false; sb.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">check</span> Saved!'; sb.classList.replace('btn-primary','btn-secondary'); setTimeout(() => { sb.textContent = 'Save Changes'; sb.classList.replace('btn-secondary','btn-primary'); }, 2000); }, 1000); };
      }
    }

    /* ===== INIT ===== */
    document.addEventListener('DOMContentLoaded', () => {
      Theme.init();

      // Mobile menu
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('overlay');
      function close() { sb.classList.remove('open'); ov.classList.remove('active'); document.body.style.overflow = ''; }
      document.getElementById('menuBtn').onclick = () => { sb.classList.add('open'); ov.classList.add('active'); document.body.style.overflow = 'hidden'; };
      ov.onclick = close;
      sb.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', close));

      // Header buttons
      document.getElementById('themeBtn').onclick = () => Theme.toggle();
      document.getElementById('notifBtn').onclick = () => toast('No new notifications', 'info');
      document.getElementById('globalSearch').onkeydown = e => { if (e.key === 'Enter' && e.target.value.trim()) toast('Search: "' + e.target.value.trim() + '"', 'info'); };

      // Nav links
      document.querySelectorAll('.nav-item[data-route]').forEach(n => n.addEventListener('click', e => { e.preventDefault(); go(n.dataset.route); }));

      // Router
      window.addEventListener('hashchange', render);
      render();
    });
  </script>
